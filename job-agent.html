<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Track Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8f9fc;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #111827;
    }

    /* ── Auth Screen ── */
    #authScreen {
      position: fixed; inset: 0; z-index: 200;
      background: #f8f9fc;
      display: flex; align-items: center; justify-content: center;
    }
    #authScreen.hidden { display: none; }
    .auth-box {
      background: #fff; border-radius: 16px; padding: 36px 40px;
      width: 400px; max-width: 95vw;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }
    .auth-logo-text { font-size: 18px; font-weight: 700; color: #111827; }
    .auth-logo-sub  { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .auth-title { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .auth-sub   { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .auth-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .auth-row label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-row input {
      padding: 10px 13px; border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; color: #111827; outline: none; transition: border-color 0.15s;
    }
    .auth-row input:focus { border-color: #6366f1; }
    .auth-btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; margin-top: 6px;
    }
    .auth-btn:hover { opacity: 0.9; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-toggle {
      text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280;
    }
    .auth-toggle a { color: #6366f1; cursor: pointer; font-weight: 500; text-decoration: none; }
    .auth-toggle a:hover { text-decoration: underline; }
    .auth-error {
      color: #dc2626; font-size: 12px; margin-bottom: 12px;
      background: #fee2e2; padding: 8px 12px; border-radius: 6px;
      display: none;
    }
    .auth-error.show { display: block; }

    /* ── App wrapper ── */
    #appWrapper {
      display: flex; width: 100%; height: 100%;
    }
    #appWrapper.hidden { display: none; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px; min-width: 300px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column;
      padding: 14px 16px; gap: 10px;
      overflow: hidden;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .logo-text { font-size: 15px; font-weight: 600; color: #111827; }
    .logo-sub  { font-size: 11px; color: #9ca3af; margin-top: 1px; }
    .divider { height: 1px; background: #f3f4f6; }
    .section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 1px;
      color: #9ca3af; text-transform: uppercase; margin-bottom: 8px;
    }
    .add-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.9; }
    .stat-row { display: flex; gap: 8px; }
    .stat-card {
      flex: 1; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 8px 10px;
    }
    .stat-value { font-size: 17px; font-weight: 700; color: #111827; line-height: 1; }
    .stat-label { font-size: 10px; color: #9ca3af; margin-top: 3px; }
    .chart-block {
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 10px;
    }
    .chart-block canvas { max-height: 120px; }
    .chart-block.countries-block { height: 260px; }
    .chart-block.countries-block canvas { max-height: 260px; }

    /* User info in sidebar */
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .user-email { font-size: 11px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn {
      font-size: 11px; color: #6366f1; background: none; border: none;
      cursor: pointer; font-weight: 500; flex-shrink: 0; padding-left: 8px;
    }
    .logout-btn:hover { text-decoration: underline; }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    /* Applications list */
    .list-area {
      flex: 1; overflow-y: auto; padding: 8px 24px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* Table header */
    .list-header {
      display: flex; align-items: center;
      padding: 0 16px; height: 36px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; margin: 14px 24px 2px; flex-shrink: 0;
    }
    .list-header span {
      font-size: 12px; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .app-card {
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 12px 16px;
      display: flex; align-items: center;
      transition: box-shadow 0.15s;
    }
    .app-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: #fafafa; }
    .app-card.new-card { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .col-company  { flex: 2; font-size: 13px; font-weight: 600; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .col-position { flex: 2; font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .col-location { flex: 1; font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .col-worktype { flex: 1; font-size: 12px; color: #6b7280; padding-right: 8px; }
    .col-link     { flex: 1; padding-right: 8px; }
    .col-link a   { font-size: 12px; color: #6366f1; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
    .col-link a:hover { text-decoration: underline; }
    .col-date     { flex: 1; font-size: 12px; color: #9ca3af; padding-right: 8px; }
    .col-feedback { flex: 1; }

    .app-badge {
      font-size: 11px; font-weight: 500; padding: 3px 8px;
      border-radius: 20px; display: inline-block;
    }
    .badge-pending { background: #f3f4f6; color: #6b7280; }
    .badge-fail    { background: #fee2e2; color: #dc2626; }
    .badge-offer   { background: #d1fae5; color: #059669; }

    /* ── Chat overlay ── */
    .chat-sidebar {
      position: absolute; inset: 0;
      background: #fff;
      display: flex; flex-direction: column;
      z-index: 20;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .chat-sidebar.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(6px);
    }

    .chat-iframe-wrap { flex: 1; overflow: hidden; }
    .chat-iframe-wrap iframe { width: 100%; height: 100%; border: none; }

    /* Ask AI toggle button */
    .ask-ai-btn {
      padding: 7px 14px; border-radius: 7px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .ask-ai-btn:hover { opacity: 0.9; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 28px;
      width: 460px; max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #111827; }
    .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .form-row label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row input {
      padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 7px;
      font-size: 13px; color: #111827; outline: none; transition: border-color 0.15s;
    }
    .form-row input:focus { border-color: #6366f1; }
    .form-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 10px; background: #f3f4f6; border: none;
      border-radius: 7px; font-size: 13px; cursor: pointer; color: #374151;
    }
    .btn-save {
      flex: 2; padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 7px; font-size: 13px;
      font-weight: 600; color: #fff; cursor: pointer;
    }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="authScreen">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-logo-icon">🔍</div>
        <div>
          <div class="auth-logo-text">JobTrack AI</div>
          <div class="auth-logo-sub">Powered by DeepSeek + Dify</div>
        </div>
      </div>
      <div id="authTitle" class="auth-title">登录账号</div>
      <div id="authSub" class="auth-sub">继续追踪你的求职进度</div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-row">
        <label>邮箱</label>
        <input id="authEmail" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="auth-row">
        <label>密码</label>
        <input id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-btn" id="authBtn" onclick="submitAuth()">登录</button>
      <div class="auth-toggle">
        <span id="authToggleText">还没有账号？</span>
        <a onclick="toggleAuthMode()"><span id="authToggleLink">立即注册</span></a>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appWrapper" class="hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">🔍</div>
        <div>
          <div class="logo-text">JobTrack AI</div>
          <div class="logo-sub">Powered by DeepSeek + Dify</div>
        </div>
      </div>

      <div class="user-row">
        <span class="user-email" id="userEmail">—</span>
        <button class="logout-btn" onclick="logout()">退出</button>
      </div>

      <button class="add-btn" onclick="toggleChat()">💬 Ask AI</button>

      <div class="divider"></div>

      <div>
        <div class="section-title">Overview</div>
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-value" id="val-total">—</div>
            <div class="stat-label">Applications</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="val-countries">—</div>
            <div class="stat-label">Countries</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-title">Work Type</div>
        <div class="chart-block"><canvas id="chartWorktype"></canvas></div>
      </div>

      <div>
        <div class="section-title">Top Countries</div>
        <div class="chart-block countries-block"><canvas id="chartCountries"></canvas></div>
      </div>

    </aside>

    <!-- Main -->
    <main class="main">
      <div style="padding:14px 24px 0;flex-shrink:0;">
        <button class="ask-ai-btn" onclick="openModal()">+ 新增申请记录</button>
      </div>

      <!-- Table header -->
      <div class="list-header">
        <span style="flex:2">公司</span>
        <span style="flex:2">职位</span>
        <span style="flex:1">地点</span>
        <span style="flex:1">工作类型</span>
        <span style="flex:1">链接</span>
        <span style="flex:1">申请时间</span>
        <span style="flex:1">反馈</span>
      </div>

      <!-- Applications list -->
      <div class="list-area" id="listArea">
        <div style="color:#9ca3af;font-size:13px;text-align:center;padding:40px 0;">加载中...</div>
      </div>

      <!-- Chat overlay -->
      <aside class="chat-sidebar hidden" id="chatSidebar">
        <div class="chat-iframe-wrap">
          <iframe id="chatIframe" src="http://localhost/chatbot/aPeOSTemhgI3UTkK" allow="microphone"></iframe>
        </div>
      </aside>
    </main>

  </div><!-- /#appWrapper -->

  <!-- Application Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">新增申请记录</h2>
      <div class="form-row">
        <label>公司名称 *</label>
        <input id="f-company" type="text" placeholder="e.g. Spotify">
      </div>
      <div class="form-row">
        <label>职位 *</label>
        <input id="f-position" type="text" placeholder="e.g. Product Manager">
      </div>
      <div class="form-row">
        <label>投递日期</label>
        <input id="f-date" type="date">
      </div>
      <div class="form-row">
        <label>国家 / 地区</label>
        <input id="f-location" type="text" placeholder="e.g. Netherlands">
      </div>
      <div class="form-row">
        <label>工作类型</label>
        <select id="f-worktype" style="padding:9px 12px;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;color:#111827;outline:none;background:#fff;">
          <option value="Remote">Remote</option>
          <option value="Onsite">Onsite</option>
        </select>
      </div>
      <div class="form-row">
        <label>职位链接</label>
        <input id="f-link" type="url" placeholder="https://...">
      </div>
      <div class="form-row">
        <label>反馈</label>
        <select id="f-feedback" style="padding:9px 12px;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;color:#111827;outline:none;background:#fff;">
          <option value="">No Response</option>
          <option value="Fail">Rejected</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" id="btnSave" onclick="saveApplication()">保存</button>
      </div>
    </div>
  </div>

<script>
const API = 'http://localhost:8000';

// ── Auth helpers ──

function getToken() { return localStorage.getItem('jwt_token'); }
function getEmail() { return localStorage.getItem('user_email'); }

function authHeader() {
  return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
}

function setSession(token, email) {
  localStorage.setItem('jwt_token', token);
  localStorage.setItem('user_email', email);
}

function clearSession() {
  localStorage.removeItem('jwt_token');
  localStorage.removeItem('user_email');
}

function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appWrapper').classList.remove('hidden');
  document.getElementById('userEmail').textContent = getEmail() || '—';
  loadAll();
}

function showAuth() {
  document.getElementById('appWrapper').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

function logout() {
  clearSession();
  showAuth();
}

// ── Auth form ──

let authMode = 'login'; // 'login' | 'register'

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  const isRegister = authMode === 'register';
  document.getElementById('authTitle').textContent   = isRegister ? '创建账号' : '登录账号';
  document.getElementById('authSub').textContent     = isRegister ? '开始追踪你的求职进度' : '继续追踪你的求职进度';
  document.getElementById('authBtn').textContent     = isRegister ? '注册' : '登录';
  document.getElementById('authToggleText').textContent = isRegister ? '已有账号？' : '还没有账号？';
  document.getElementById('authToggleLink').textContent = isRegister ? '立即登录' : '立即注册';
  setAuthError('');
}

function setAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

async function submitAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { setAuthError('请填写邮箱和密码'); return; }

  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.textContent = '请稍候...';
  setAuthError('');

  const endpoint = authMode === 'register' ? '/auth/register' : '/auth/login';

  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      setAuthError(data.detail || '操作失败，请重试');
    } else {
      setSession(data.token, data.email);
      showApp();
    }
  } catch (e) {
    setAuthError('网络错误，请检查 API 服务是否运行');
  }

  btn.disabled = false;
  btn.textContent = authMode === 'register' ? '注册' : '登录';
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('authScreen').classList.contains('hidden')) {
    submitAuth();
  }
});

// ── App logic ──

function badgeHtml(feedback) {
  if (!feedback) return '<span class="app-badge badge-pending">No Response</span>';
  if (feedback.toLowerCase() === 'fail') return '<span class="app-badge badge-fail">Rejected</span>';
  return `<span class="app-badge badge-offer">${feedback}</span>`;
}

function cardHtml(app, isNew = false) {
  const date = app.applied_date ? app.applied_date.slice(0,10) : '—';
  const linkHtml = app.link
    ? `<a href="${app.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ 链接</a>`
    : '<span style="font-size:12px;color:#d1d5db;">—</span>';
  return `
    <div class="app-card ${isNew ? 'new-card' : ''}" onclick='openEdit(${JSON.stringify(app)})' style="cursor:pointer;">
      <span class="col-company">${app.company || '—'}</span>
      <span class="col-position">${app.position || '—'}</span>
      <span class="col-location">${app.location || '—'}</span>
      <span class="col-worktype">${app.work_type || '—'}</span>
      <span class="col-link">${linkHtml}</span>
      <span class="col-date">${date}</span>
      <span class="col-feedback">${badgeHtml(app.feedback)}</span>
    </div>`;
}

async function apiFetch(path, options = {}) {
  const res = await fetch(`${API}${path}`, {
    ...options,
    headers: { ...authHeader(), ...(options.headers || {}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res;
}

async function loadApplications() {
  const res = await apiFetch('/applications');
  if (!res) return;
  const data = await res.json();
  const area = document.getElementById('listArea');
  if (data.length === 0) {
    area.innerHTML = '<div style="color:#9ca3af;font-size:13px;text-align:center;padding:40px 0;">暂无申请记录</div>';
    return;
  }
  area.innerHTML = data.map(a => cardHtml(a)).join('');
}

async function loadStats() {
  const res = await apiFetch('/stats/summary');
  if (!res) return;
  const s = await res.json();
  document.getElementById('val-total').textContent     = s.total;
  document.getElementById('val-countries').textContent = s.countries;
}

let worktypeChart, countriesChart;

async function loadWorktypeChart() {
  const res = await apiFetch('/stats/worktype');
  if (!res) return;
  const d = await res.json();
  if (worktypeChart) worktypeChart.destroy();
  worktypeChart = new Chart(document.getElementById('chartWorktype'), {
    type: 'doughnut',
    data: {
      labels: ['Remote', 'Onsite'],
      datasets: [{ data: [d.remote, d.onsite], backgroundColor: ['#6366f1','#10b981'], borderWidth: 0, hoverOffset: 4 }]
    },
    options: { plugins: { legend: { position:'bottom', labels:{ font:{size:11}, color:'#6b7280', boxWidth:12 } } }, cutout:'65%' }
  });
}

async function loadCountriesChart() {
  const res = await apiFetch('/stats/countries');
  if (!res) return;
  const data = await res.json();
  if (countriesChart) countriesChart.destroy();
  countriesChart = new Chart(document.getElementById('chartCountries'), {
    type: 'bar',
    data: {
      labels: data.map(d => d.location),
      datasets: [{ data: data.map(d => d.count), backgroundColor:'#6366f1', borderRadius:4, borderSkipped:false }]
    },
    options: {
      indexAxis: 'y',
      maintainAspectRatio: false,
      plugins: { legend: { display:false } },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:10}, color:'#9ca3af'} },
        y: { grid:{display:false}, ticks:{font:{size:10}, color:'#374151'} }
      }
    }
  });
}

function loadAll() {
  loadApplications();
  loadStats();
  loadWorktypeChart();
  loadCountriesChart();
}

function toggleChat() {
  document.getElementById('chatSidebar').classList.toggle('hidden');
}

let editingId = null;

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增申请记录';
  document.getElementById('btnSave').textContent = '保存';
  ['f-company','f-position','f-location','f-link','f-feedback','f-worktype']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(app) {
  editingId = app.id;
  document.getElementById('modalTitle').textContent = '编辑申请记录';
  document.getElementById('btnSave').textContent = '更新';
  document.getElementById('f-company').value   = app.company || '';
  document.getElementById('f-position').value  = app.position || '';
  document.getElementById('f-date').value       = app.applied_date || '';
  document.getElementById('f-location').value  = app.location || '';
  document.getElementById('f-link').value       = app.link || '';
  document.getElementById('f-feedback').value  = app.feedback || '';
  document.getElementById('f-worktype').value  = app.work_type || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  editingId = null;
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveApplication() {
  const company  = document.getElementById('f-company').value.trim();
  const position = document.getElementById('f-position').value.trim();
  if (!company || !position) { alert('公司名称和职位为必填项'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '保存中...';

  const body = {
    company, position,
    applied_date: document.getElementById('f-date').value || null,
    location:     document.getElementById('f-location').value.trim() || null,
    link:         document.getElementById('f-link').value.trim() || null,
    feedback:     document.getElementById('f-feedback').value.trim() || null,
    work_type:    document.getElementById('f-worktype').value || null,
  };

  const url    = editingId ? `/applications/${editingId}` : '/applications';
  const method = editingId ? 'PUT' : 'POST';

  const res = await apiFetch(url, { method, body: JSON.stringify(body) });

  btn.disabled = false; btn.textContent = editingId ? '更新' : '保存';

  if (res && res.ok) {
    closeModal();
    await loadApplications();
    loadStats();
  } else {
    alert('保存失败，请重试');
  }
}

// ── Init ──
if (getToken()) {
  showApp();
} else {
  showAuth();
}
</script>
</body>
</html>
